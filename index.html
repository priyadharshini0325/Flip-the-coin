<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title><bold>Flip the Coin | devChallenges.io</bold></title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Flip the Coin</h1>

        <p><bold>Press the coin or the button to flip the coin</bold></p>

        <div class="coin-box">

            <img id="coin"
                 src="heads.svg"
                 alt="Coin">

            <img class="shadow"
                 src="shadow.svg"
                 alt="Shadow">

        </div>

        <h2 id="result">Heads</h2>

        <button onclick="flipCoin()">Random</button>

    </div>


    <script src="script.js"></script>

</body>

</html>
